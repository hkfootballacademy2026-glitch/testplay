<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AR Baseball</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#0a1626; --chalk:#f2efe6; --amber:#ffb627;
    --signal:#ff4d3d; --green:#37d67a; --dirt:#b0632f;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--night);font-family:'DotGothic16',monospace;color:var(--chalk)}
  button{font-family:'DotGothic16',monospace;cursor:pointer}
  button:focus-visible{outline:3px solid var(--chalk);outline-offset:3px}

  #stage{position:fixed;inset:0}
  video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);filter:brightness(.92) saturate(.9)}
  canvas{position:absolute;inset:0;width:100%;height:100%}

  .screen{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center;padding:24px}
  .nightBg{
    background:
      radial-gradient(ellipse 120% 55% at 50% 118%, #1c4d31 0%, #123322 34%, transparent 68%),
      radial-gradient(ellipse 60% 30% at 50% 104%, var(--dirt) 0%, transparent 60%),
      linear-gradient(#060d1a 0%, #0a1626 55%, #0e1f38 100%);
  }
  .nightBg::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(circle 5px at 18% 12%, #fff8 99%, transparent),
      radial-gradient(circle 5px at 82% 12%, #fff8 99%, transparent),
      radial-gradient(ellipse 45% 60% at 18% 10%, rgba(255,248,220,.10), transparent 70%),
      radial-gradient(ellipse 45% 60% at 82% 10%, rgba(255,248,220,.10), transparent 70%);
  }

  /* ===== ホーム(手書きワイヤーフレームのレイアウトを再現) ===== */
  #home h1{
    font-size:min(13vw,72px);letter-spacing:.05em;line-height:1.05;color:var(--chalk);
    text-shadow:0 0 30px rgba(255,182,39,.55),0 5px 0 #000;
    border-bottom:4px solid var(--amber);padding:0 14px 10px;
  }
  #home h1 span{color:var(--amber)}
  .menuGrid{display:flex;flex-direction:column;gap:18px;align-items:center;z-index:1}
  .menuRow{display:flex;gap:18px}
  .modeBtn{
    width:min(38vw,220px);height:min(38vw,190px);
    background:rgba(255,255,255,.05);border:3px solid var(--chalk);border-radius:10px;
    color:var(--chalk);font-size:min(5.5vw,24px);letter-spacing:.1em;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
    box-shadow:0 6px 0 rgba(0,0,0,.5);transition:transform .1s;
  }
  .modeBtn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.5)}
  .modeBtn .icon{font-size:42px;line-height:1}
  .modeBtn small{font-size:12px;color:#9db4c8;letter-spacing:.05em}
  .modeBtn.match{width:min(60vw,300px);height:min(30vw,140px);border-color:var(--amber);color:var(--amber);box-shadow:0 0 22px rgba(255,182,39,.3),0 6px 0 rgba(0,0,0,.5)}
  #homeMsg{font-size:13px;color:#7d93a8;min-height:1.2em;z-index:1}

  /* ===== 試合設定 ===== */
  #matchSetup{display:none;overflow-y:auto}
  #matchSetup h2{font-size:min(9vw,44px);color:var(--amber);text-shadow:0 4px 0 #000}
  .inningsRow{display:flex;gap:14px}
  .inningsBtn{
    width:76px;height:76px;border-radius:10px;border:3px solid var(--chalk);
    background:rgba(255,255,255,.05);color:var(--chalk);font-size:22px;
    box-shadow:0 5px 0 rgba(0,0,0,.5);
  }
  .inningsBtn.sel{background:var(--amber);color:#0a1626;border-color:var(--amber);box-shadow:0 0 20px rgba(255,182,39,.6),0 5px 0 #8a5c00}
  .bigBtn{
    font-size:20px;letter-spacing:.15em;color:#0a1626;background:var(--amber);
    border:none;border-radius:8px;padding:14px 40px;
    box-shadow:0 0 24px rgba(255,182,39,.5),0 5px 0 #8a5c00;transition:transform .1s;
  }
  .bigBtn:active{transform:translateY(4px)}
  .subBtn{font-size:14px;color:var(--chalk);background:transparent;border:2px solid rgba(242,239,230,.4);border-radius:8px;padding:10px 22px}
  #matchSetup .note{font-size:13px;color:#9db4c8;line-height:1.9}
  #matchSetup .note b{color:var(--amber)}


  /* ===== 相手打者の左右設定 ===== */
  #pitchSetup{display:none;overflow-y:auto}
  #pitchSetup h2{font-size:min(9vw,44px);color:var(--amber);text-shadow:0 4px 0 #000}
  #pitchSetup .note{font-size:13px;color:#9db4c8;line-height:1.9;max-width:560px}
  .handChoice{display:flex;gap:14px;align-items:stretch;justify-content:center;z-index:1}
  .handChoice.compact{gap:10px}
  .handBtn{
    width:min(38vw,190px);min-height:124px;padding:12px 10px;
    border:3px solid rgba(242,239,230,.55);border-radius:12px;
    background:rgba(255,255,255,.05);color:var(--chalk);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    box-shadow:0 5px 0 rgba(0,0,0,.5);transition:transform .1s,background .15s,border-color .15s;
  }
  .handChoice.compact .handBtn{width:min(31vw,150px);min-height:92px;padding:8px}
  .handBtn:active{transform:translateY(3px)}
  .handBtn.sel{background:var(--amber);color:#081421;border-color:var(--amber);box-shadow:0 0 20px rgba(255,182,39,.48),0 5px 0 #8a5c00}
  .handMark{font-family:'Oswald',sans-serif;font-size:42px;font-weight:700;line-height:1}
  .handChoice.compact .handMark{font-size:30px}
  .handBtn b{font-size:17px;letter-spacing:.08em}
  .handBtn small{font-size:10px;line-height:1.45;color:#9db4c8}
  .handBtn.sel small{color:#283a45}
  .setupMsg{font-size:12px;color:#9db4c8;min-height:1.4em;z-index:1}
  .setupSection{display:flex;flex-direction:column;align-items:center;gap:8px;z-index:1}
  .setupSectionTitle{font-size:14px;letter-spacing:.08em;color:var(--chalk)}
  .viewChoice{display:flex;gap:14px;align-items:stretch;justify-content:center;z-index:1}
  .viewChoice.compact{gap:10px}
  .viewBtn{
    width:min(38vw,190px);min-height:112px;padding:11px 9px;
    border:3px solid rgba(242,239,230,.55);border-radius:12px;
    background:rgba(255,255,255,.05);color:var(--chalk);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    box-shadow:0 5px 0 rgba(0,0,0,.5);transition:transform .1s,background .15s,border-color .15s;
  }
  .viewChoice.compact .viewBtn{width:min(31vw,150px);min-height:84px;padding:7px}
  .viewBtn:active{transform:translateY(3px)}
  .viewBtn.sel{background:var(--green);color:#061610;border-color:var(--green);box-shadow:0 0 20px rgba(55,214,122,.40),0 5px 0 #116637}
  .viewMark{font-family:'Oswald',sans-serif;font-size:38px;font-weight:700;line-height:1}
  .viewChoice.compact .viewMark{font-size:28px}
  .viewBtn b{font-size:16px;letter-spacing:.06em}
  .viewBtn small{font-size:10px;line-height:1.45;color:#9db4c8}
  .viewBtn.sel small{color:#19372a}
  @media (max-height:700px){
    #pitchSetup,#matchSetup{justify-content:flex-start;padding-top:28px;padding-bottom:34px;gap:11px}
    .handBtn{min-height:90px}.handMark{font-size:31px}
    .viewBtn{min-height:84px}.viewMark{font-size:30px}
  }

  /* ===== ゲーム内HUD ===== */
  #homeBtn{
    position:fixed;top:10px;left:10px;z-index:30;
    background:rgba(5,10,20,.7);border:2px solid rgba(242,239,230,.35);border-radius:8px;
    color:var(--chalk);font-size:13px;padding:8px 12px;display:none;
  }
  #board{
    position:fixed;top:10px;left:50%;transform:translateX(-50%);
    display:none;gap:12px;align-items:center;
    background:linear-gradient(#101c10,#050a05);
    border:3px solid #2a3a2a;border-radius:8px;
    padding:7px 14px;box-shadow:0 4px 20px rgba(0,0,0,.6), inset 0 0 30px rgba(0,0,0,.8);
    z-index:20;max-width:96vw;
  }
  .lampGroup{display:flex;flex-direction:column;align-items:center;gap:3px}
  .lampLabel{font-size:10px;letter-spacing:.15em;color:#6e8f6e}
  .lamps{display:flex;gap:4px}
  .lamp{width:11px;height:11px;border-radius:50%;background:#182818;border:1px solid #223522;transition:all .15s}
  .lamp.b.on{background:var(--green);box-shadow:0 0 8px var(--green)}
  .lamp.s.on{background:var(--amber);box-shadow:0 0 8px var(--amber)}
  .lamp.o.on{background:var(--signal);box-shadow:0 0 8px var(--signal)}
  .boardDivider{width:2px;height:32px;background:#223522}
  .boardNum{display:flex;flex-direction:column;align-items:center;min-width:34px}
  .boardNum .val{font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;color:var(--amber);text-shadow:0 0 10px rgba(255,182,39,.6);line-height:1}
  .boardNum .cap{font-size:9px;color:#6e8f6e;letter-spacing:.08em}

  /* 塁状況ダイヤ */
  .diamond{position:relative;width:36px;height:36px}
  .base{position:absolute;width:12px;height:12px;background:#182818;border:1px solid #223522;transform:rotate(45deg);transition:all .15s}
  .base.on{background:var(--amber);box-shadow:0 0 8px var(--amber)}
  .base.b1{right:0;top:12px}.base.b2{left:12px;top:0}.base.b3{left:0;top:12px}

  /* 試合ラインスコア */
  #lineScore{
    position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:20;display:none;
    background:rgba(5,10,8,.85);border:2px solid #2a3a2a;border-radius:6px;padding:4px 8px;
  }
  #lineScore table{border-collapse:collapse;font-family:'Oswald',sans-serif}
  #lineScore th,#lineScore td{padding:1px 7px;font-size:13px;text-align:center;color:var(--chalk)}
  #lineScore th{color:#6e8f6e;font-family:'DotGothic16',monospace;font-size:11px}
  #lineScore td.cur{color:var(--amber);text-shadow:0 0 6px rgba(255,182,39,.7)}
  #lineScore td.total{color:var(--amber);font-weight:700;border-left:1px solid #2a3a2a}
  #lineScore .teamName{font-family:'DotGothic16',monospace;font-size:11px;color:#9db4c8;text-align:left}

  #speedGun{position:fixed;top:78px;right:12px;z-index:20;text-align:right;opacity:0;transition:opacity .2s;pointer-events:none}
  #pitchViewBadge{
    position:fixed;top:78px;left:12px;z-index:21;display:none;pointer-events:none;
    padding:6px 10px;border:1px solid rgba(242,239,230,.32);border-radius:999px;
    background:rgba(5,10,20,.72);color:var(--green);font-size:11px;letter-spacing:.05em;
    box-shadow:0 3px 12px rgba(0,0,0,.35);white-space:nowrap;
  }
  #speedGun.show{opacity:1}
  #speedGun .kmh{font-family:'Oswald',sans-serif;font-weight:700;font-size:48px;color:var(--chalk);text-shadow:0 0 16px rgba(255,182,39,.9),0 2px 0 #000;line-height:1}
  #speedGun .unit{font-size:13px;color:var(--amber);letter-spacing:.2em}

  #call{
    position:fixed;top:38%;left:50%;transform:translate(-50%,-50%) scale(.6);
    font-size:min(12vw,64px);letter-spacing:.08em;color:var(--chalk);
    text-shadow:0 0 24px rgba(255,182,39,.8),0 4px 0 #000;
    opacity:0;z-index:25;pointer-events:none;white-space:nowrap;
  }
  #call.pop{animation:callPop 1.15s ease-out forwards}
  @keyframes callPop{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}
    15%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}
    30%{transform:translate(-50%,-50%) scale(1)}
    80%{opacity:1}
    100%{opacity:0;transform:translate(-50%,-52%) scale(1)}
  }

  /* 攻守交代などの中間表示 */
  #banner{
    position:fixed;inset:0;z-index:35;display:none;flex-direction:column;
    align-items:center;justify-content:center;gap:10px;background:rgba(4,8,16,.82);text-align:center;padding:20px;
  }
  #banner .big{font-size:min(11vw,56px);color:var(--amber);text-shadow:0 4px 0 #000}
  #banner .sub{font-size:16px;color:var(--chalk);line-height:1.9}

  #hint{
    position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
    background:rgba(5,10,20,.75);border:1px solid rgba(242,239,230,.25);
    padding:7px 16px;border-radius:999px;font-size:13px;z-index:20;
    max-width:92vw;text-align:center;display:none;
  }

  /* ===== 結果 ===== */
  #result{position:fixed;inset:0;z-index:45;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:rgba(4,8,16,.9);text-align:center;padding:24px}
  #result h2{font-size:min(10vw,52px);color:var(--amber);text-shadow:0 4px 0 #000}
  #result .stats{font-size:16px;line-height:2.1;color:var(--chalk)}
  #result .stats b{color:var(--amber)}
  #resultScore table{border-collapse:collapse;margin:0 auto;font-family:'Oswald',sans-serif}
  #resultScore th,#resultScore td{padding:2px 9px;font-size:15px;text-align:center;color:var(--chalk);border:1px solid #2a3a2a}
  #resultScore th{color:#6e8f6e;font-family:'DotGothic16',monospace;font-size:12px}
  .btnRow{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}

  @media (prefers-reduced-motion: reduce){ #call.pop{animation-duration:.01s} }
</style>
</head>
<body>

<div id="stage">
  <video id="cam" playsinline muted></video>
  <canvas id="game"></canvas>
</div>

<!-- ============ ホーム ============ -->
<div id="home" class="screen nightBg">
  <h1>AR <span>Baseball</span></h1>
  <div class="menuGrid">
    <div class="menuRow">
      <button class="modeBtn" id="btnPitch"><span class="icon">&#9918;</span>ピッチング<small>投手視点・捕手視点を選択</small></button>
      <button class="modeBtn" id="btnBat"><span class="icon">&#127934;&#65039;</span>バッティング<small>体を振ってフルスイング</small></button>
    </div>
    <button class="modeBtn match" id="btnMatch"><span class="icon">&#127942;</span>試合<small>攻守フル対戦・進塁と守備はオート</small></button>
  </div>
  <div id="homeMsg">※カメラを使用します(映像は端末内だけで処理されます)</div>
</div>

<!-- ============ ピッチング設定 ============ -->
<div id="pitchSetup" class="screen nightBg">
  <h2>ピッチング設定</h2>
  <div class="setupSection">
    <div class="setupSectionTitle">視点を選択</div>
    <div class="viewChoice" aria-label="ピッチング画面の視点">
      <button class="viewBtn" type="button" data-view="pitcher" aria-pressed="false">
        <span class="viewMark">投</span><b>ピッチャー視点</b><small>自分の手元から<br>打者へ投げる</small>
      </button>
      <button class="viewBtn" type="button" data-view="catcher" aria-pressed="false">
        <span class="viewMark">捕</span><b>キャッチャー視点</b><small>画面奥の自分から<br>手前へ球が迫る</small>
      </button>
    </div>
  </div>
  <div class="setupSection">
    <div class="setupSectionTitle">相手打者を選択</div>
    <div class="note">打席は選択した視点に合わせて左右反転します。<br>9分割は打者の胸下から膝までに固定されます。</div>
    <div class="handChoice" aria-label="相手打者の打席">
      <button class="handBtn" type="button" data-hand="right" aria-pressed="false">
        <span class="handMark">右</span><b>右バッター</b><small>右打席</small>
      </button>
      <button class="handBtn" type="button" data-hand="left" aria-pressed="false">
        <span class="handMark">左</span><b>左バッター</b><small>左打席</small>
      </button>
    </div>
  </div>
  <button class="bigBtn" id="pitchStartBtn">この設定で開始</button>
  <button class="subBtn" id="pitchSetupBackBtn">ホームへ戻る</button>
  <div id="pitchSetupMsg" class="setupMsg"></div>
</div>

<!-- ============ 試合設定 ============ -->
<div id="matchSetup" class="screen nightBg">
  <h2>試合設定</h2>
  <div class="note">何回制で戦う?(あなたは<b>先攻</b>)</div>
  <div class="inningsRow">
    <button class="inningsBtn" data-inn="1">1回</button>
    <button class="inningsBtn sel" data-inn="3">3回</button>
    <button class="inningsBtn" data-inn="5">5回</button>
    <button class="inningsBtn" data-inn="9">9回</button>
  </div>
  <div class="note">守備時の視点</div>
  <div class="viewChoice compact" aria-label="試合のピッチング視点">
    <button class="viewBtn" type="button" data-view="pitcher" aria-pressed="false">
      <span class="viewMark">投</span><b>投手視点</b><small>打者へ投げる</small>
    </button>
    <button class="viewBtn" type="button" data-view="catcher" aria-pressed="false">
      <span class="viewMark">捕</span><b>捕手視点</b><small>球が手前へ迫る</small>
    </button>
  </div>
  <div class="note">守備時に対戦するCOM打者</div>
  <div class="handChoice compact" aria-label="試合の相手打者の打席">
    <button class="handBtn" type="button" data-hand="right" aria-pressed="false">
      <span class="handMark">右</span><b>右バッター</b><small>右打席</small>
    </button>
    <button class="handBtn" type="button" data-hand="left" aria-pressed="false">
      <span class="handMark">左</span><b>左バッター</b><small>左打席</small>
    </button>
  </div>
  <div class="note">表:あなたが<b>バッティング</b> / 裏:あなたが<b>ピッチング</b><br>ランナーの進塁・守備は自動で処理されます</div>
  <button class="bigBtn" id="matchStartBtn">PLAY BALL</button>
  <button class="subBtn" id="setupBackBtn">ホームへ戻る</button>
  <div id="matchSetupMsg" class="setupMsg"></div>
</div>

<!-- ============ HUD ============ -->
<button id="homeBtn">&#8962; ホーム</button>
<div id="board">
  <div class="lampGroup"><div class="lampLabel">B</div>
    <div class="lamps"><div class="lamp b"></div><div class="lamp b"></div><div class="lamp b"></div></div></div>
  <div class="lampGroup"><div class="lampLabel">S</div>
    <div class="lamps"><div class="lamp s"></div><div class="lamp s"></div></div></div>
  <div class="lampGroup"><div class="lampLabel">O</div>
    <div class="lamps"><div class="lamp o"></div><div class="lamp o"></div></div></div>
  <div class="boardDivider"></div>
  <div class="diamond" id="diamond">
    <div class="base b1"></div><div class="base b2"></div><div class="base b3"></div>
  </div>
  <div class="boardDivider"></div>
  <div class="boardNum"><div class="val" id="stat1">0</div><div class="cap" id="stat1cap">奪三振</div></div>
  <div class="boardNum"><div class="val" id="stat2">0</div><div class="cap" id="stat2cap">被安打</div></div>
</div>
<div id="lineScore"></div>
<div id="speedGun"><div class="kmh" id="kmh">---</div><div class="unit">km/h</div></div>
<div id="pitchViewBadge"></div>
<div id="call"></div>
<div id="banner"><div class="big" id="bannerBig"></div><div class="sub" id="bannerSub"></div></div>
<div id="hint"></div>

<!-- ============ 結果 ============ -->
<div id="result">
  <h2 id="resultTitle"></h2>
  <div id="resultScore"></div>
  <div class="stats" id="resultStats"></div>
  <div class="btnRow">
    <button class="bigBtn" id="againBtn">もう一回</button>
    <button class="subBtn" id="resultHomeBtn">ホームへ</button>
  </div>
</div>

<script type="module">
import { PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

/* ================= DOM/描画基盤 ================= */
const $ = id => document.getElementById(id);
const video = $('cam'), canvas = $('game'), ctx = canvas.getContext('2d');
let W=0, H=0, dpr=1;
function resize(){
  dpr = Math.min(window.devicePixelRatio||1, 2);
  W = canvas.clientWidth; H = canvas.clientHeight;
  canvas.width = W*dpr; canvas.height = H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize', resize);
const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const smoothstep=t=>t*t*(3-2*t);

/* ================= 画像生成したCOMバッター・シルエット =================

let ac=null;
function beep(freq,dur,type='square',gain=.15,slide=0){
  if(!ac) return;
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type; o.frequency.value=freq;
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(40,freq+slide), ac.currentTime+dur);
  g.gain.value=gain; g.gain.exponentialRampToValueAtTime(.001, ac.currentTime+dur);
  o.connect(g).connect(ac.destination); o.start(); o.stop(ac.currentTime+dur);
}
function noiseBurst(dur=.1,gain=.28){
  if(!ac) return;
  const len=ac.sampleRate*dur, buf=ac.createBuffer(1,len,ac.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
  const s=ac.createBufferSource(), g=ac.createGain();
  g.gain.value=gain; s.buffer=buf; s.connect(g).connect(ac.destination); s.start();
}
const SFX={
  mitt(){noiseBurst(.08,.3);beep(180,.07,'sine',.2)},
  crack(){noiseBurst(.05,.35);beep(900,.12,'triangle',.25,-500)},
  whiff(){beep(300,.18,'sawtooth',.06,-180)},
  cheer(){beep(523,.12,'square',.1);setTimeout(()=>beep(659,.12,'square',.1),110);setTimeout(()=>beep(784,.2,'square',.12),220)},
  boo(){beep(200,.3,'sawtooth',.08,-80)},
  fanfare(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.18,'square',.12),i*130))},
};

/* ================= 塁・得点(オート進塁) ================= */
function advanceRunners(n){ // n=1 単打, 2 二塁打, 4 本塁打
  let runs=0;
  if(n>=4){ runs = 1 + M.bases.filter(Boolean).length; M.bases=[false,false,false]; return runs; }
  for(let i=2;i>=0;i--){
    if(M.bases[i]){
      M.bases[i]=false;
      if(i+n>=3) runs++; else M.bases[i+n]=true;
    }
  }
  M.bases[n-1]=true;
  return runs;
}
function walkRunners(){
  let runs=0;
  if(M.bases[0]){
    if(M.bases[1]){ if(M.bases[2]) runs++; else M.bases[2]=true; }
    else M.bases[1]=true;
  }
  M.bases[0]=true;
  return runs;
}
function addRuns(r){
  if(r<=0) return;
  const arr = M.half===0 ? M.scoreYou : M.scoreCom;
  arr[M.inning-1] = (arr[M.inning-1]||0) + r;
}

const arm={ hist:{L:[],R:[]}, cockedAt:{L:0,R:0}, activeSide:null };
const battingAR={
  side:1, sideScore:0, ready:false, lastSeen:0,
  gripX:0, gripY:0, dirX:-.34, dirY:-.94, length:180,
  zone:null
};

function screenPoint(p){
  if(!p || (Number.isFinite(p.visibility) && p.visibility<.12)) return null;
  return {
    x:(1-p.x)*W,
    y:p.y*H,
    z:Number.isFinite(p.z)?p.z:0
  };
}
function meanPoint(...pts){
  const valid=pts.filter(Boolean);
  if(!valid.length) return null;
  return {
    x:valid.reduce((a,p)=>a+p.x,0)/valid.length,
    y:valid.reduce((a,p)=>a+p.y,0)/valid.length,
    z:valid.reduce((a,p)=>a+(p.z||0),0)/valid.length
  };
}
function normalizedVector(x,y,fallbackX=1,fallbackY=0){
  const len=Math.hypot(x,y);
  if(len<.001){
    const f=Math.hypot(fallbackX,fallbackY)||1;
    return {x:fallbackX/f,y:fallbackY/f};
  }
  return {x:x/len,y:y/len};
}
function handBallPoint(side,lm){
  const wr=screenPoint(lm[side==='L'?LM.Lwr:LM.Rwr]);
  const el=screenPoint(lm[side==='L'?LM.Lel:LM.Rel]);
  if(!wr) return null;
  let dir={x:0,y:-1};
  if(el) dir=normalizedVector(wr.x-el.x,wr.y-el.y,0,-1);
  const offset=clamp(Math.min(W,H)*.014,7,14);
  return {x:wr.x+dir.x*offset,y:wr.y+dir.y*offset};
}

function updateBattingAR(lm,now=performance.now()){
  const ls=screenPoint(lm[LM.Lsh]), rs=screenPoint(lm[LM.Rsh]);
  const lh=screenPoint(lm[LM.Lhip]), rh=screenPoint(lm[LM.Rhip]);
  const lw=screenPoint(lm[LM.Lwr]), rw=screenPoint(lm[LM.Rwr]);
  const le=screenPoint(lm[LM.Lel]), re=screenPoint(lm[LM.Rel]);
  const shoulder=meanPoint(ls,rs), hip=meanPoint(lh,rh);
  if(!shoulder||!hip) return;
  const body=meanPoint(shoulder,hip);
  const torsoH=Math.max(40,Math.abs(hip.y-shoulder.y));
  const grip=meanPoint(lw,rw)||lw||rw;

  // 半身の向きは肩・腰の奥行きを優先し、両手がある場合は手元の反対側を投手側として補助する。
  if(!(S.ball&&S.ball.dir==='toYou')){
    let candidate=0, confidence=0;
    if(ls&&rs&&lh&&rh){
      const depthL=ls.z*.68+lh.z*.32;
      const depthR=rs.z*.68+rh.z*.32;
      const depthGap=Math.abs(depthL-depthR);
      if(depthGap>.022){
        const lead=depthL<depthR?meanPoint(ls,lh):meanPoint(rs,rh);
        if(lead&&Math.abs(lead.x-body.x)>2){
          candidate=Math.sign(lead.x-body.x);
          confidence=clamp(depthGap*7,.25,1);
        }
      }
    }
    if(grip){
      const handDelta=grip.x-body.x;
      if(Math.abs(handDelta)>Math.max(10,W*.018)){
        const handCandidate=handDelta<0?1:-1;
        if(!candidate){ candidate=handCandidate; confidence=.46; }
        else if(candidate===handCandidate) confidence=Math.min(1,confidence+.22);
      }
    }
    if(!candidate) candidate=battingAR.side||(body.x<W*.5?1:-1);
    battingAR.sideScore=lerp(battingAR.sideScore,candidate,.07+confidence*.08);
    if(Math.abs(battingAR.sideScore)>.12) battingAR.side=battingAR.sideScore>=0?1:-1;
  }

  if(!grip) return;
  const elbows=meanPoint(le,re)||shoulder;
  let dx=grip.x-elbows.x, dy=grip.y-elbows.y;
  const bodyDx=grip.x-body.x, bodyDy=grip.y-body.y;
  if(Math.hypot(dx,dy)<12){ dx=bodyDx; dy=bodyDy; }
  if(Math.hypot(dx,dy)<12){ dx=-battingAR.side*.38; dy=-.92; }
  // バットの先端が身体側へ向かないよう、手元から身体の外側へ伸ばす。
  if(dx*bodyDx+dy*bodyDy<0){ dx=-dx; dy=-dy; }
  const dir=normalizedVector(dx,dy,-battingAR.side*.38,-.92);
  const targetLength=clamp(torsoH*1.38,Math.min(W,H)*.25,Math.min(W*.56,H*.58));
  if(!battingAR.ready){
    battingAR.gripX=grip.x; battingAR.gripY=grip.y;
    battingAR.dirX=dir.x; battingAR.dirY=dir.y;
    battingAR.length=targetLength;
  }else{
    battingAR.gripX=lerp(battingAR.gripX,grip.x,.48);
    battingAR.gripY=lerp(battingAR.gripY,grip.y,.48);
    const blended=normalizedVector(lerp(battingAR.dirX,dir.x,.38),lerp(battingAR.dirY,dir.y,.38),dir.x,dir.y);
    battingAR.dirX=blended.x; battingAR.dirY=blended.y;
    battingAR.length=lerp(battingAR.length,targetLength,.20);
  }
  battingAR.ready=true;
  battingAR.lastSeen=now;
}

function trackThrow(lm, now){
  for(const side of ['L','R']){
    const wr=lm[side==='L'?LM.Lwr:LM.Rwr], sh=lm[side==='L'?LM.Lsh:LM.Rsh];
    if(!wr||!sh) continue;
    const h=arm.hist[side];
    h.push({t:now,x:wr.x,y:wr.y});
    while(h.length && now-h[0].t>900) h.shift();
    if(wr.y < sh.y-0.06){ arm.cockedAt[side]=now; arm.activeSide=side; }
    if(h.length>=3 && now>=S.cooldownUntil && !S.ball){
      const a=h[h.length-3], b=h[h.length-1];
      const dt=(b.t-a.t)/1000; if(dt<=0) continue;
      const vx=(b.x-a.x)/dt, vy=(b.y-a.y)/dt, speed=Math.hypot(vx,vy);
      const cocked = now-arm.cockedAt[side] < 780;
      const crossedDown = a.y < sh.y && b.y >= sh.y-0.035;
      // カメラは左右反転表示なので、横速度だけ画面座標へ反転して渡す。
      if(cocked && vy>0.72 && speed>1.35 && crossedDown){
        releaseUserPitch(side,lm,speed,{vx:-vx,vy});
      }
    }
  }
}

/* ================= スイング判定(あなたが打つ) ================= */
function trackSwing(lm, now){
  for(const side of ['L','R']){
    const wr=lm[side==='L'?LM.Lwr:LM.Rwr];
    if(!wr) continue;
    const h=arm.hist[side];
    h.push({t:now,x:wr.x,y:wr.y});
    while(h.length && now-h[0].t>500) h.shift();
    if(h.length>=3 && now-S.swing.lastAt>600){
      const a=h[h.length-3], b=h[h.length-1];
      const dt=(b.t-a.t)/1000; if(dt<=0) continue;
      const vx=Math.abs((b.x-a.x)/dt), vTotal=Math.hypot((b.x-a.x)/dt,(b.y-a.y)/dt);
      if(vTotal>1.9 && vx>0.9){
        S.swing.lastAt=now;
        if(S.ball && S.mode==='bat' && !S.ball.swungAt) onUserSwing(now);
      }
    }
  }
}

/* ================= あなたのストライクゾーン(半身の打撃姿勢用) ================= */
function userZone(){
  // 投球中はリリース時のゾーンを固定し、身体の動きで的が逃げないようにする。
  if(S.ball&&S.ball.dir==='toYou'&&S.ball.zone) return {...S.ball.zone};

  let raw={x:W*.56,y:H*.22,w:Math.min(132,W*.29),h:Math.min(270,H*.34)};
  if(lastLm){
    const ls=screenPoint(lastLm[LM.Lsh]), rs=screenPoint(lastLm[LM.Rsh]);
    const lh=screenPoint(lastLm[LM.Lhip]), rh=screenPoint(lastLm[LM.Rhip]);
    const shoulder=meanPoint(ls,rs), hip=meanPoint(lh,rh);
    if(shoulder&&hip){
      const body=meanPoint(shoulder,hip);
      const torsoH=Math.max(70,Math.abs(hip.y-shoulder.y));
      const minH=Math.min(170,H*.22), maxH=Math.min(360,H*.42);
      const h=clamp(torsoH*1.34,minH,Math.max(minH,maxH));
      const minW=Math.min(88,W*.22), maxW=Math.min(190,W*.32);
      const w=clamp(h*.46,minW,Math.max(minW,maxW));
      const shoulderSpan=ls&&rs?Math.abs(ls.x-rs.x):w*.32;
      const hipSpan=lh&&rh?Math.abs(lh.x-rh.x):w*.32;
      const bodyHalf=Math.max(shoulderSpan,hipSpan,w*.30)*.56;
      const gap=clamp(w*.10,8,18);
      const bodyLeft=body.x-bodyHalf, bodyRight=body.x+bodyHalf;
      const rightRoom=W*.96-(bodyRight+gap);
      const leftRoom=(bodyLeft-gap)-W*.04;
      let side=battingAR.side||1;
      if(side>0&&rightRoom<w*.72&&leftRoom>rightRoom) side=-1;
      if(side<0&&leftRoom<w*.72&&rightRoom>leftRoom) side=1;
      const x=side>0?bodyRight+gap:bodyLeft-gap-w;
      const top=shoulder.y+torsoH*.06;
      raw={
        x:clamp(x,W*.04,Math.max(W*.04,W*.96-w)),
        y:clamp(top,H*.09,Math.max(H*.09,H*.62-h)),
        w,h
      };
    }
  }
  if(!battingAR.zone) battingAR.zone={...raw};
  else{
    const a=.20;
    battingAR.zone.x=lerp(battingAR.zone.x,raw.x,a);
    battingAR.zone.y=lerp(battingAR.zone.y,raw.y,a);
    battingAR.zone.w=lerp(battingAR.zone.w,raw.w,a);
    battingAR.zone.h=lerp(battingAR.zone.h,raw.h,a);
  }
  return {...battingAR.zone};
}
/* COMバッターとストライクゾーンを、シルエットの胸下〜膝へ正確に対応させる。 */
function pitcherViewSceneLayout(){
  const portrait=H>=W;
  const hand=S.batterHand==='left'?'left':'right';
  const minBatterH=Math.min(300,H*.47);
  const maxBatterH=Math.min(650,H*.74);
  const batterH=clamp(H*(portrait?.58:.72),minBatterH,Math.max(minBatterH,maxBatterH));
  const batterW=batterH*(154/492)*1.10;
  const feetY=clamp(H*(portrait?.80:.86),batterH+H*.045,H*.92);
  const batterY=feetY-batterH;
  const zoneTopInBatter=.37;
  const zoneBottomInBatter=.73;
  const zoneH=clamp(batterH*(zoneBottomInBatter-zoneTopInBatter),Math.min(145,H*.22),Math.min(300,H*.40));
  const zoneW=zoneH*.68;
  let zoneX=clamp(W*.5-zoneW/2,W*.05,W*.95-zoneW);
  const zoneY=clamp(batterY+batterH*zoneTopInBatter,H*.15,Math.max(H*.15,H*.88-zoneH));
  const gap=clamp(zoneW*.055,6,15);
  let batterX=hand==='right'?zoneX+zoneW+gap-batterW*.36:zoneX-gap-batterW*.64;
  const groupLeft=Math.min(zoneX,batterX);
  const groupRight=Math.max(zoneX+zoneW,batterX+batterW);
  let shiftX=0;
  if(groupLeft<W*.015) shiftX=W*.015-groupLeft;
  if(groupRight+shiftX>W*.985) shiftX+=W*.985-(groupRight+shiftX);
  zoneX+=shiftX;batterX+=shiftX;
  const zone={x:zoneX,y:zoneY,w:zoneW,h:zoneH};
  const batter={x:batterX,y:batterY,w:batterW,h:batterH};
  return {
    view:'pitcher',hand,mirror:hand==='left'?-1:1,
    zone,batter,feetY,batterAlpha:.90,
    plateY:clamp(zone.y+zone.h+clamp(zone.h*.045,7,14),zone.y+zone.h+6,H*.91),
    aimBounds:{x:W*.035,y:H*.11,w:W*.93,h:H*.78}
  };
}
function catcherViewSceneLayout(){
  const portrait=H>=W;
  const hand=S.batterHand==='left'?'left':'right';
  // 捕手視点では、打者とホームベースはカメラの手前にある。
  const minBatterH=Math.min(350,H*.55);
  const maxBatterH=Math.min(760,H*.86);
  const batterH=clamp(H*(portrait?.71:.84),minBatterH,Math.max(minBatterH,maxBatterH));
  const batterW=batterH*(154/492)*1.16;
  const feetY=clamp(H*(portrait?.92:.94),batterH+H*.028,H*.965);
  const batterY=feetY-batterH;
  const zoneTopInBatter=.395;
  const zoneBottomInBatter=.725;
  const zoneH=clamp(batterH*(zoneBottomInBatter-zoneTopInBatter),Math.min(165,H*.235),Math.min(340,H*.43));
  const zoneW=zoneH*.68;
  let zoneX=clamp(W*.5-zoneW/2,W*.045,W*.955-zoneW);
  const zoneY=clamp(batterY+batterH*zoneTopInBatter,H*.19,Math.max(H*.19,H*.865-zoneH));
  // 反対側から見るため、右打者・左打者の画面上の位置を投手視点から反転する。
  const gap=clamp(zoneW*.06,7,16);
  let batterX=hand==='right'?zoneX-gap-batterW*.64:zoneX+zoneW+gap-batterW*.36;
  const groupLeft=Math.min(zoneX,batterX);
  const groupRight=Math.max(zoneX+zoneW,batterX+batterW);
  let shiftX=0;
  if(groupLeft<W*.012) shiftX=W*.012-groupLeft;
  if(groupRight+shiftX>W*.988) shiftX+=W*.988-(groupRight+shiftX);
  zoneX+=shiftX;batterX+=shiftX;
  const zone={x:zoneX,y:zoneY,w:zoneW,h:zoneH};
  const batter={x:batterX,y:batterY,w:batterW,h:batterH};
  const plateY=clamp(zone.y+zone.h+clamp(zone.h*.045,8,16),zone.y+zone.h+7,H*.92);
  return {
    view:'catcher',hand,mirror:hand==='left'?1:-1,
    zone,batter,feetY,batterAlpha:.86,plateY,
    aimBounds:{x:W*.025,y:H*.10,w:W*.95,h:H*.82},
    mittBase:{x:zone.x+zone.w*.5,y:clamp(plateY+zone.h*.72,H*.77,H*.95)}
  };
}
function pitchingSceneLayout(){
  return S.pitchView==='catcher'?catcherViewSceneLayout():pitcherViewSceneLayout();
}
function comZone(){ return {...pitchingSceneLayout().zone}; }

/* 手の通過位置と振り方向を、画面全体の着弾座標へ変換する。 */
function fullScreenPitchTarget(side,lm,motion,z,bounds){
  const wr=screenPoint(lm[side==='L'?LM.Lwr:LM.Rwr]);
  const ls=screenPoint(lm[LM.Lsh]), rs=screenPoint(lm[LM.Rsh]);
  const lh=screenPoint(lm[LM.Lhip]), rh=screenPoint(lm[LM.Rhip]);
  const shoulder=meanPoint(ls,rs)||wr||{x:W*.5,y:H*.32};
  const hip=meanPoint(lh,rh)||{x:shoulder.x,y:shoulder.y+H*.22};
  const bodyX=shoulder.x;
  const shoulderSpan=Math.max(ls&&rs?Math.abs(ls.x-rs.x):0,W*.12);
  const torsoH=Math.max(Math.abs(hip.y-shoulder.y),H*.12);
  const relX=wr?clamp((wr.x-bodyX)/(shoulderSpan*.95),-1.75,1.75):0;
  const relY=wr?clamp((wr.y-shoulder.y)/(torsoH*1.05),-.90,1.85):0;
  const mvx=clamp(motion?.vx||0,-4,4);
  const mvy=clamp(motion?.vy||1,0,5);

  // 普通のリリースは現在のゾーン中央。手を左右・上下へ通すと画面端近くまで投げ分けられる。
  const baseX=(z.x+z.w*.5-bounds.x)/bounds.w;
  const baseY=(z.y+z.h*.5-bounds.y)/bounds.h;
  const catcher=S.pitchView==='catcher';
  const nx=clamp(baseX+relX*(catcher?.225:.205)+mvx*(catcher?.036:.032),.02,.98);
  const ny=clamp(baseY+relY*(catcher?.170:.155)+(mvy-1.25)*(catcher?.028:.025),.02,.98);
  return {
    x:bounds.x+bounds.w*nx,
    y:bounds.y+bounds.h*ny
  };
}

/* ================= あなたの投球(ピッチングモード/試合の裏) ================= */
function releaseUserPitch(side,lm,speedNorm,motion={vx:0,vy:1}){
  const wr=lm[side==='L'?LM.Lwr:LM.Rwr];
  const kmh=Math.round(Math.min(168,82+speedNorm*34+Math.random()*4));
  S.maxKmh=Math.max(S.maxKmh,kmh); S.pitches++;
  const release=handBallPoint(side,lm)||{x:(1-wr.x)*W,y:wr.y*H};
  const sx=release.x, sy=release.y;
  const layout=pitchingSceneLayout(), z=layout.zone;
  const aim=fullScreenPitchTarget(side,lm,motion,z,layout.aimBounds);
  const control=clamp((speedNorm-1.35)/3.1,0,1);
  const missX=z.w*(.025+(1-control)*.055);
  const missY=z.h*(.020+(1-control)*.050);
  const tx=clamp(aim.x+(Math.random()-.5)*missX*2,layout.aimBounds.x,layout.aimBounds.x+layout.aimBounds.w);
  const ty=clamp(aim.y+(Math.random()-.5)*missY*2,layout.aimBounds.y,layout.aimBounds.y+layout.aimBounds.h);
  const flight=Math.max(420,1030-kmh*3.6);
  const now=performance.now(), releaseDelay=62;
  // ボールは検出した指先位置に一瞬残り、その同じ座標から相手方向へ飛び出す。
  S.ball={dir:'toCom',sx,sy,tx,ty,t0:now+releaseDelay,dur:flight,kmh,resolved:false,
          releaseSide:side,zone:{...z},pitchView:S.pitchView,
          curveX:clamp(motion.vx*z.w*.035,-z.w*.10,z.w*.10)};
  S.cooldownUntil=now+releaseDelay+flight+900;
  showGun(kmh);
  const inZone=tx>z.x&&tx<z.x+z.w&&ty>z.y&&ty<z.y+z.h;
  const b=S.comBatter;
  b.willSwing=inZone?Math.random()<.78:Math.random()<.22;
  b.swingDuration=560;
  if(b.willSwing){
    let p=.62-(kmh-90)*.0068;
    if(!inZone) p-=.30;
    b.contact=Math.random()<Math.max(.05,p);
    b.swingT=S.ball.t0+flight*.58;
  }else{
    b.contact=false;
    b.swingT=0;
  }
  S.ball.inZone=inZone;
  arm.hist[side]=[];
  beep(120,.08,'sine',.12);
}

function settlePitchOutcome(outcome,youBatting,visual={}){
  const fairBall=outcome==='out'||outcome==='single'||outcome==='double'||outcome==='hr';
  if(S.isMatch && fairBall){
    startFieldPlay(outcome,youBatting,visual);
    return;
  }
  if(visual.text) addCall(visual.text,visual.color);
  if(visual.hitDir) launchHitBall(visual.hitDir);
  applyOutcome(outcome,youBatting);
  setTimeout(()=>{ if(!S.fieldPlay) S.ball=null; },600);
}

function resolveUserPitch(){
  const ball=S.ball, b=S.comBatter;
  ball.resolved=true;
  let outcome=null;
  let visual={text:'',color:'var(--chalk)',hitDir:null,style:'line',direction:(Math.random()-.5)*1.4};
  if(b.willSwing && b.contact){
    SFX.crack();
    visual.hitDir='up';
    const r=Math.random();
    if(r<0.14){
      outcome='hr';
      visual={...visual,text:'ホームラン…!',color:'#ff6b5e',style:'deep'};
      SFX.boo(); shake(14);
    }else if(r<0.32){
      outcome='double';
      visual={...visual,text:'二塁打を打たれた',color:'#ff9d8a',style:'deep'};
    }else if(r<0.50){
      outcome='single';
      visual={...visual,text:'ヒットを打たれた',color:'#ff9d8a',style:Math.random()<.55?'ground':'line'};
    }else if(r<0.72){
      outcome='out';
      const plays=[
        {text:'セカンドゴロ アウト!',style:'ground',direction:.24},
        {text:'ショートゴロ アウト!',style:'ground',direction:-.20},
        {text:'センターフライ アウト!',style:'fly',direction:0},
        {text:'サードゴロ アウト!',style:'ground',direction:-.46}
      ];
      visual={...visual,...plays[Math.floor(Math.random()*plays.length)],color:'#ffb627'};
    }else{
      outcome='foul';
      visual={...visual,text:'ファール!',color:'#c7d5e2'};
    }
  }else if(b.willSwing){
    SFX.whiff(); setTimeout(()=>SFX.mitt(),90);
    outcome='strike';
    visual.text=S.strikes>=2?'空振り三振!!':'スイング ストライク!';
    visual.color='#ffb627';
  }else if(ball.inZone){
    SFX.mitt(); outcome='strike';
    visual.text=S.strikes>=2?'見逃し三振!!':'ストライク!';
    visual.color='#ffb627';
  }else{
    SFX.mitt(); outcome='ballCall';
    visual.text=S.balls>=3?'フォアボール…':'ボール';
    visual.color='#37d67a';
  }
  settlePitchOutcome(outcome,/*youBatting=*/false,visual);
}

/* ================= COMの投球(バッティングモード/試合の表) ================= */
function getComPitcherPose(now){
  const p=S.comPitcher;
  const bx=W*.5, by=H*.86, s=Math.min(W,H)*.22;
  const bob=Math.sin(now/600)*3;
  let wind=0;
  if(p.phase==='windup') wind=clamp((now-p.t0)/900,0,1);
  else if(p.phase==='follow') wind=1-clamp((now-(p.t0+900))/300,0,1);
  const armAng=-.4-wind*2.2;
  const shoulder={x:bx+s*.16,y:by+bob-s*.5};
  const hand={
    x:shoulder.x+Math.cos(armAng)*s*.58,
    y:shoulder.y+Math.sin(armAng)*s*.58
  };
  return {bx,by,s,bob,wind,armAng,shoulder,hand};
}
function comPitchStart(now){
  const p=S.comPitcher;
  p.phase='windup'; p.t0=now; p.releasePoint=null;
  // ワインドアップ0.9秒後にリリース
  setTimeout(()=>{
    if(S.running && S.mode==='bat' && !S.paused) comRelease();
    else { S.comPitcher.phase='idle'; S.comPitcher.nextPitchAt=performance.now()+1500; }
  }, 900);
}
function pickComPitchTarget(z,wantsStrike){
  if(wantsStrike){
    return {
      x:z.x+z.w*(0.12+Math.random()*.76),
      y:z.y+z.h*(0.12+Math.random()*.76)
    };
  }
  const side=Math.floor(Math.random()*4);
  const alongX=z.x+z.w*(0.12+Math.random()*.76);
  const alongY=z.y+z.h*(0.12+Math.random()*.76);
  const gapX=z.w*(0.16+Math.random()*.22);
  const gapY=z.h*(0.14+Math.random()*.20);
  if(side===0) return {x:z.x-gapX,y:alongY};       // 左ボール
  if(side===1) return {x:z.x+z.w+gapX,y:alongY};   // 右ボール
  if(side===2) return {x:alongX,y:z.y-gapY};       // 高めボール
  return {x:alongX,y:z.y+z.h+gapY};                // 低めボール
}
function comRelease(){
  const now=performance.now();
  const kmh=Math.round(100+Math.random()*48);
  const z=userZone();
  const wantsStrike=Math.random()<0.65;
  const target=pickComPitchTarget(z,wantsStrike);
  const pose=getComPitcherPose(now);
  const sx=pose.hand.x, sy=pose.hand.y;
  const tx=clamp(target.x,8,W-8);
  // 描画中の投手の手を始点にし、そこから必ず画面上側のゾーンへ向かわせる。
  const ty=clamp(Math.min(target.y,sy-H*.09),H*.05,sy-H*.09);
  const inZone=tx>z.x&&tx<z.x+z.w&&ty>z.y&&ty<z.y+z.h;
  const flight=Math.max(520,1150-kmh*4.2), releaseDelay=45;
  S.comPitcher.releasePoint={x:sx,y:sy};
  S.ball={dir:'toYou', sx,sy, tx,ty, curveX:(Math.random()-.5)*z.w*.14,
          zone:{...z}, t0:now+releaseDelay, dur:flight, kmh,
          resolved:false, inZone, swungAt:0, quality:null};
  S.comPitcher.phase='follow';
  showGun(kmh);
  beep(120,.08,'sine',.12);
}
function onUserSwing(now){
  const ball=S.ball;
  ball.swungAt=now;
  const impact=ball.t0+ball.dur*0.92;
  const err=Math.abs(now-impact);
  ball.quality = err<95?'perfect' : err<190?'good' : err<300?'weak' : 'miss';
}
function resolveComPitch(){
  const ball=S.ball;
  ball.resolved=true;
  let outcome=null;
  let visual={text:'',color:'var(--chalk)',hitDir:null,style:'line',direction:(Math.random()-.5)*1.4};
  if(ball.swungAt){
    const q=ball.quality;
    if(q==='miss'){
      SFX.whiff(); setTimeout(()=>SFX.mitt(),90);
      outcome='strike';
      visual.text=S.strikes>=2?'空振り三振…':'空振り!';
      visual.color='#ffb627';
    }else if(q==='weak'){
      SFX.crack(); visual.hitDir='down';
      if(Math.random()<0.5){
        outcome='foul';
        visual.text='ファール!'; visual.color='#c7d5e2';
      }else{
        outcome='out';
        const plays=[
          {text:'セカンドゴロ アウト…',style:'ground',direction:.22},
          {text:'ボテボテのゴロ アウト…',style:'ground',direction:-.06},
          {text:'浅いフライ アウト…',style:'fly',direction:(Math.random()-.5)*.7}
        ];
        visual={...visual,...plays[Math.floor(Math.random()*plays.length)],color:'#ff9d8a'};
      }
    }else if(q==='good'){
      SFX.crack(); visual.hitDir='down';
      const r=Math.random();
      if(r<0.62){
        outcome='single';
        visual={...visual,text:'ヒット!!',color:'#37d67a',style:Math.random()<.5?'ground':'line'};
        SFX.cheer();
      }else if(r<0.82){
        outcome='double';
        visual={...visual,text:'二塁打!!',color:'#37d67a',style:'deep'};
        SFX.cheer();
      }else{
        outcome='out';
        visual={...visual,text:'ライナー 正面…アウト',color:'#ff9d8a',style:'line'};
      }
      shake(6);
    }else{ // perfect
      SFX.crack(); visual.hitDir='down';
      const r=Math.random();
      if(r<0.5){
        outcome='hr';
        visual={...visual,text:'ホームラン!!!',color:'#ffb627',style:'deep'};
        SFX.fanfare(); shake(16);
      }else if(r<0.85){
        outcome='double';
        visual={...visual,text:'フェンス直撃 二塁打!!',color:'#37d67a',style:'deep'};
        SFX.cheer();
      }else{
        outcome='single';
        visual={...visual,text:'鋭いヒット!!',color:'#37d67a',style:'line'};
        SFX.cheer();
      }
    }
  }else if(ball.inZone){
    SFX.mitt(); outcome='strike';
    visual.text=S.strikes>=2?'見逃し三振…':'ストライク!';
    visual.color='#ffb627';
  }else{
    SFX.mitt(); outcome='ballCall';
    visual.text=S.balls>=3?'フォアボール!':'ボール';
    visual.color='#37d67a';
  }
  settlePitchOutcome(outcome,/*youBatting=*/true,visual);
}

/* ================= 結果の反映(カウント/塁/得点) ================= */
function applyOutcome(outcome, youBatting){
  const isHit = outcome==='single'||outcome==='double'||outcome==='hr';
  if(outcome==='strike') S.strikes++;
  if(outcome==='foul' && S.strikes<2) S.strikes++;
  if(outcome==='ballCall') S.balls++;

  let plateDone=false, outAdded=false;
  if(S.strikes>=3){ plateDone=true; outAdded=true; if(!youBatting) S.ks++; }
  if(outcome==='out'){ plateDone=true; outAdded=true; }
  if(S.balls>=4){ plateDone=true; if(S.isMatch) addRuns(walkRunners()); }
  if(isHit){
    plateDone=true;
    if(!youBatting) S.hitsAllowed++;
    if(youBatting && !S.isMatch){
      S.batHits += outcome==='hr'?0:1;
      S.batHRs  += outcome==='hr'?1:0;
      S.batBases += outcome==='single'?1:outcome==='double'?2:4;
    }
    if(S.isMatch) addRuns(advanceRunners(outcome==='single'?1:outcome==='double'?2:4));
  }
  if(outAdded){ S.outs++; if(!youBatting) SFX.cheer(); }
  if(plateDone){ S.balls=0; S.strikes=0; }
  updateBoard();

  // モードごとの進行
  if(S.isMatch){
    if(S.outs>=3) setTimeout(nextHalf, 1300);
  }else if(S.mode==='pitch'){
    if(S.outs>=3) setTimeout(showPracticePitchResult, 1300);
  }else{ // バッティング練習:10球勝負(ファール以外で1球消費)
    if(plateDone || outcome==='strike' || outcome==='ballCall'){
      S.batLeft--; updateBoard();
      if(S.batLeft<=0){ setTimeout(showPracticeBatResult, 1300); return; }
    }
  }
}

/* ================= 試合の進行 ================= */
async function nextHalf(){
  M.bases=[false,false,false];
  S.balls=0; S.strikes=0; S.outs=0; S.ball=null; S.hitBall=null; S.fieldPlay=null;
  const arr = M.half===0?M.scoreYou:M.scoreCom;
  if(arr[M.inning-1]===undefined) arr[M.inning-1]=0;

  if(M.half===0){
    M.half=1;
    S.mode='pitch';
    updatePitchViewBadge();
    const viewGuide=S.pitchView==='catcher'?'画面奥から手前へ投げ込め!':'ゾーンへ向かって振り抜け!';
    await banner(`${M.inning}回裏 守備!`, `<b style="color:var(--green)">${pitchViewLabel()}</b> / 相手は<b style="color:var(--amber)">${batterHandLabel()}</b><br>${viewGuide}`);
  }else{
    if(M.inning>=M.innings){ endMatch(); return; }
    M.inning++; M.half=0;
    S.mode='bat';
    updatePitchViewBadge();
    await banner(`${M.inning}回表 攻撃!`, 'あなたは<b style="color:var(--amber)">バッター</b><br>タイミングを合わせてスイング!');
    S.comPitcher.nextPitchAt = performance.now()+1500;
  }
  S.cooldownUntil = performance.now()+800;
  const cur = M.half===0?M.scoreYou:M.scoreCom;
  if(cur[M.inning-1]===undefined) cur[M.inning-1]=0;
  updateBoard();
}
function endMatch(){
  S.running=false;
  const you=M.scoreYou.reduce((a,b)=>a+(b||0),0);
  const com=M.scoreCom.reduce((a,b)=>a+(b||0),0);
  const title = you>com?'勝利!!':you<com?'敗北…':'引き分け';
  $('resultTitle').textContent=title;
  if(you>com) SFX.fanfare(); else if(you<com) SFX.boo();
  let head='<tr><th></th>';
  for(let i=1;i<=M.innings;i++) head+=`<th>${i}</th>`;
  head+='<th>R</th></tr>';
  const row=(n,a)=>`<tr><td>${n}</td>${a.map(v=>`<td>${v===undefined?'-':v}</td>`).join('')}${'<td></td>'.repeat(Math.max(0,M.innings-a.length))}<td style="color:var(--amber)">${a.reduce((x,y)=>x+(y||0),0)}</td></tr>`;
  $('resultScore').innerHTML=`<table>${head}${row('あなた',M.scoreYou)}${row('COM',M.scoreCom)}</table>`;
  $('resultStats').innerHTML=`奪三振 <b>${S.ks}</b> / 最速 <b>${S.maxKmh||'-'} km/h</b>`;
  showHUD(false);
  $('result').style.display='flex';
}

/* ================= 練習結果 ================= */
function showPracticePitchResult(){
  S.running=false;
  $('resultTitle').textContent='スリーアウト チェンジ!';
  $('resultScore').innerHTML='';
  $('resultStats').innerHTML=
    `奪三振 <b>${S.ks}</b> / 被安打 ${S.hitsAllowed}<br>投球数 ${S.pitches} 球 / 最速 <b>${S.maxKmh} km/h</b>`;

}
function showPracticeBatResult(){
  S.running=false;
  const total=S.batHits+S.batHRs;
  $('resultTitle').textContent = S.batHRs>=3?'ホームランアーティスト!':total>=5?'ナイスバッティング!':'また挑戦しよう!';
  $('resultScore').innerHTML='';
  $('resultStats').innerHTML=
    `10球勝負の結果<br>ヒット <b>${S.batHits}</b> 本 / ホームラン <b>${S.batHRs}</b> 本<br>塁打数 <b>${S.batBases}</b>`;
  showHUD(false); $('result').style.display='flex';
}

/* ================= 試合用・球場カメラ演出 ================= */
function startFieldPlay(outcome,youBatting,visual={}){
  const now=performance.now();
  const reduced=window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const baseDur=outcome==='hr'?4200:outcome==='double'?3500:3100;
  S.ball=null;
  S.hitBall=null;
  S.paused=true;
  $('speedGun').classList.remove('show');
  S.fieldPlay={
    outcome,youBatting,
    text:visual.text||'', color:visual.color||'var(--chalk)',
    style:visual.style||'line',
    direction:clamp(Number.isFinite(visual.direction)?visual.direction:(Math.random()-.5)*1.4,-.9,.9),
    basesBefore:[...M.bases],
    t0:now,dur:reduced?Math.min(900,baseDur):baseDur,
    finished:false
  };
  hint('球場カメラ：守備と走塁を再生中');
}

function finishFieldPlay(play){
  if(play.finished) return;
  play.finished=true;
  S.fieldPlay=null;
  S.paused=false;
  if(play.text) addCall(play.text,play.color);
  applyOutcome(play.outcome,play.youBatting);
  const now=performance.now();
  S.cooldownUntil=now+900;
  S.comBatter.willSwing=false;
  if(S.mode==='bat'){
    S.comPitcher.phase='idle';
    S.comPitcher.nextPitchAt=now+1900;
    arm.hist={L:[],R:[]};
  }else{
    arm.hist={L:[],R:[]};
    arm.cockedAt={L:0,R:0};
  }
}

function fieldLayout(){
  const home={x:W*.5,y:H*.89};
  const first={x:W*.72,y:H*.67};
  const second={x:W*.5,y:H*.47};
  const third={x:W*.28,y:H*.67};
  return {
    home,first,second,third,
    mound:{x:W*.5,y:H*.69},
    bases:[home,first,second,third,home]
  };
}

function fieldLanding(play){
  const x=clamp(W*.5+play.direction*W*.31,W*.13,W*.87);
  let y=H*.35;
  if(play.outcome==='hr') y=H*.055;
  else if(play.style==='ground') y=H*(.50+Math.abs(play.direction)*.025);
  else if(play.style==='line') y=H*.36;
  else if(play.style==='fly') y=H*.29;
  else if(play.style==='deep') y=H*.19;
  return {x,y};
}

function nearestFielder(play,starts,landing){
  let pool;
  if(play.style==='ground') pool=[0,2,3,4,5];
  else if(play.style==='fly'||play.style==='deep') pool=[6,7,8,3,4];
  else pool=[2,3,4,5,6,7,8];
  let best=pool[0],bestD=Infinity;
  for(const i of pool){
    const dx=starts[i].x-landing.x,dy=starts[i].y-landing.y;
    const d=dx*dx+dy*dy;
    if(d<bestD){ bestD=d; best=i; }
  }
  return best;
}

function movePoint(a,b,t){
  const e=smoothstep(clamp(t,0,1));
  return {x:lerp(a.x,b.x,e),y:lerp(a.y,b.y,e)};
}

function drawFieldCharacter(x,y,body,label,scale=1,runPhase=0){
  const s=Math.max(10,Math.min(W,H)*.025)*scale;
  const leg=Math.sin(runPhase)*s*.18;
  ctx.save();
  ctx.translate(x,y);
  ctx.fillStyle='rgba(0,0,0,.28)';
  ctx.beginPath();ctx.ellipse(0,s*.62,s*.62,s*.18,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#d6d1c5';ctx.lineWidth=Math.max(2,s*.18);ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-s*.13,s*.18);ctx.lineTo(-s*.24+leg,s*.58);ctx.stroke();
  ctx.beginPath();ctx.moveTo(s*.13,s*.18);ctx.lineTo(s*.24-leg,s*.58);ctx.stroke();
  ctx.fillStyle=body;
  const x0=-s*.42,y0=-s*.26,w0=s*.84,h0=s*.72,r0=s*.18;
  ctx.beginPath();
  ctx.moveTo(x0+r0,y0);ctx.lineTo(x0+w0-r0,y0);ctx.quadraticCurveTo(x0+w0,y0,x0+w0,y0+r0);
  ctx.lineTo(x0+w0,y0+h0-r0);ctx.quadraticCurveTo(x0+w0,y0+h0,x0+w0-r0,y0+h0);
  ctx.lineTo(x0+r0,y0+h0);ctx.quadraticCurveTo(x0,y0+h0,x0,y0+h0-r0);
  ctx.lineTo(x0,y0+r0);ctx.quadraticCurveTo(x0,y0,x0+r0,y0);ctx.closePath();ctx.fill();
  ctx.fillStyle='#e0b08c';ctx.beginPath();ctx.arc(0,-s*.52,s*.25,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=body;ctx.beginPath();ctx.arc(0,-s*.60,s*.27,Math.PI,Math.PI*2);ctx.fill();
  if(label){
    ctx.font=`700 ${Math.max(8,s*.35)}px 'Oswald',sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#fff';
    ctx.fillText(label,0,s*.08);
  }
  ctx.restore();
}

function baseRoutePoint(L,start,steps,t){
  if(steps<=0) return L.bases[start];
  const d=clamp(t,0,1)*steps;
  const seg=Math.min(steps-1,Math.floor(d));
  const f=seg===steps-1&&d>=steps?1:d-seg;
  const a=L.bases[start+seg],b=L.bases[start+seg+1];
  return {x:lerp(a.x,b.x,f),y:lerp(a.y,b.y,f)};
}

function runnerSpecs(play){
  const specs=[];
  const hitBases=play.outcome==='single'?1:play.outcome==='double'?2:play.outcome==='hr'?4:0;
  play.basesBefore.forEach((on,i)=>{
    if(!on) return;
    const start=i+1;
    const steps=play.outcome==='hr'?4-start:Math.min(hitBases,4-start);
    specs.push({start,steps,label:'R'});
  });
  if(hitBases) specs.push({start:0,steps:hitBases,label:'B'});
  return specs;
}

function fieldBallPoint(play,p,L,landing){
  const isGround=play.style==='ground';
  const hitEnd=play.outcome==='hr'?.72:isGround?.46:.53;
  if(p<=hitEnd){
    const q=smoothstep(clamp(p/hitEnd,0,1));
    let y=lerp(L.home.y-18,landing.y,q);
    if(isGround) y-=Math.abs(Math.sin(q*Math.PI*4))*H*.022*(1-q);
    else{
      const arc=play.outcome==='hr'?H*.22:play.style==='deep'?H*.18:play.style==='fly'?H*.14:H*.075;
      y-=Math.sin(q*Math.PI)*arc;
    }
    return {x:lerp(L.home.x,landing.x,q),y,visible:true,r:play.outcome==='hr'?lerp(9,4,q):lerp(9,6,q)};
  }
  if(play.outcome==='out'&&isGround&&p<.78){
    const q=smoothstep(clamp((p-hitEnd)/(.78-hitEnd),0,1));
    const y=lerp(landing.y,L.first.y,q)-Math.sin(q*Math.PI)*H*.055;
    return {x:lerp(landing.x,L.first.x,q),y,visible:true,r:6};
  }
  if((play.outcome==='single'||play.outcome==='double')&&p<.86){
    const q=smoothstep(clamp((p-hitEnd)/(.86-hitEnd),0,1));
    const target=play.outcome==='single'?L.second:L.third;
    return {x:lerp(landing.x,target.x,q),y:lerp(landing.y,target.y,q)-Math.sin(q*Math.PI)*H*.045,visible:true,r:5.5};
  }
  return {x:landing.x,y:landing.y,visible:false,r:5};
}

function drawFieldBall(play,p,L,landing){
  const ball=fieldBallPoint(play,p,L,landing);
  if(!ball.visible) return;
  ctx.fillStyle='rgba(255,255,255,.18)';
  for(let i=1;i<=3;i++){
    const past=fieldBallPoint(play,Math.max(0,p-i*.018),L,landing);
    if(!past.visible) continue;
    ctx.beginPath();ctx.arc(past.x,past.y,Math.max(2,past.r*.72),0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle='#f7f3e9';ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#dc4f32';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r*.62,.4,2.2);ctx.stroke();
}

function drawFielders(play,p,L,landing){
  const starts=fielderStarts();
  const primary=nearestFielder(play,starts,landing);
  const defense=play.youBatting?'#2e5e94':'#e7e2d5';
  for(let i=0;i<starts.length;i++){
    const st=starts[i];
    let pos={x:st.x,y:st.y};
    if(i===primary){
      const end=play.outcome==='hr'?{x:landing.x,y:Math.max(H*.16,landing.y+H*.10)}:landing;
      const chase=clamp((p-.07)/(play.outcome==='hr'?.62:.48),0,1);
      pos=movePoint(st,end,chase);
    }else if(play.outcome==='out'&&play.style==='ground'&&st.label==='1B'){
      pos=movePoint(st,L.first,clamp((p-.18)/.36,0,1));
    }else{
      const shift=clamp((p-.12)/.48,0,1)*.12;
      pos={x:lerp(st.x,landing.x,shift),y:lerp(st.y,landing.y,shift)};
    }
    drawFieldCharacter(pos.x,pos.y,defense,st.label,.78,p*24+i);
  }
}

function drawRunners(play,p,L){
  const offense=play.youBatting?'#ffb627':'#ff5c55';
  if(play.outcome==='out'){
    const runMax=play.style==='ground'?.94:.38;
    const rp=clamp((p-.10)/.67,0,runMax);
    const pos=baseRoutePoint(L,0,1,rp);
    drawFieldCharacter(pos.x,pos.y,offense,'B',.85,p*32);
    play.basesBefore.forEach((on,i)=>{
      if(on){const b=L.bases[i+1];drawFieldCharacter(b.x,b.y,offense,'R',.78,0);}
    });
    return;
  }
  const specs=runnerSpecs(play);
  specs.forEach((spec,i)=>{
    const delay=.08+i*.018;
    const end=play.outcome==='hr'?.91:.83;
    const rp=smoothstep(clamp((p-delay)/(end-delay),0,1));
    const pos=baseRoutePoint(L,spec.start,spec.steps,rp);
    drawFieldCharacter(pos.x,pos.y,offense,spec.label,.85,p*34+i*1.7);
  });
}

function drawPlayCall(play,p,L,landing){
  if(p<.68) return;
  let word='SAFE!';
  let at=L.first;
  let color='#37d67a';
  if(play.outcome==='out'){
    word='OUT!';color='#ff4d3d';at=play.style==='ground'?L.first:landing;
  }else if(play.outcome==='double') at=L.second;
  else if(play.outcome==='hr'){word='HOME RUN!';color='#ffb627';at={x:W*.5,y:H*.36};}
  const a=clamp((p-.68)/.12,0,1);
  ctx.save();ctx.globalAlpha=a;
  ctx.font=`700 ${Math.min(44,Math.max(25,W*.075))}px 'Oswald',sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=color;
  ctx.shadowColor='rgba(0,0,0,.8)';ctx.shadowBlur=8;ctx.lineWidth=5;ctx.strokeStyle='rgba(0,0,0,.75)';
  ctx.strokeText(word,at.x,at.y-34);ctx.fillText(word,at.x,at.y-34);
  ctx.restore();

  if(p>.82&&play.text){
    const alpha=clamp((p-.82)/.08,0,1);
    ctx.save();ctx.globalAlpha=alpha;
    const y=Math.max(126,H*.16);
    ctx.fillStyle='rgba(4,10,18,.8)';ctx.fillRect(W*.12,y-25,W*.76,50);
    ctx.strokeStyle='rgba(242,239,230,.35)';ctx.strokeRect(W*.12,y-25,W*.76,50);
    ctx.font=`${Math.min(23,Math.max(15,W*.045))}px 'DotGothic16'`;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=play.youBatting?'#ffb627':'#ff8a7e';
    ctx.fillText(play.text,W*.5,y);

function drawFieldPlay(now){
  const play=S.fieldPlay;if(!play)return;
  const p=clamp((now-play.t0)/play.dur,0,1);
  const L=fieldLayout();
  const landing=fieldLanding(play);
  drawStadium(play,L,p);

/* COMバッター：画像生成した完成シルエットを使用 */
function batterSwingState(p,now){
  const idle=Math.sin(now/620);
  if(p<=0){
    return {rot:idle*.006,shear:idle*.008,sx:1+idle*.004,sy:1-idle*.003,dx:idle*1.2,dy:Math.sin(now/510)*1.5};
  }
  const load=smoothstep(clamp(p/.22,0,1));
  const drive=smoothstep(clamp((p-.16)/.34,0,1));
  const finish=smoothstep(clamp((p-.48)/.52,0,1));
  return {
    // 全身の生成画像を腰付近からしならせ、構え→インパクト→フォローを表現。
    rot:-.025*load-.245*drive+.250*finish,
    shear:-.025*load+.150*drive-.125*finish,
    sx:1-.018*load+.115*drive-.095*finish,
    sy:1+.012*load-.025*drive+.013*finish,
    dx:-9*load-28*drive+34*finish,
    dy:-3*drive+3*finish
  };
}
function drawBatterImageFrame(layout,p,alpha=1,now=performance.now()){
  if(!batterSilhouetteReady) return;
  const r=layout.batter;
  const st=batterSwingState(p,now);
  const mirror=layout.mirror||1;
  // 画像を腰付近で反転するため、左右どちらでも足元とゾーン側の位置がずれない。
  const pivotNorm=mirror===1?.49:.51;
  const pivotX=r.x+r.w*pivotNorm, pivotY=r.y+r.h*.965;
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.translate(pivotX+st.dx*mirror,pivotY+st.dy);
  ctx.rotate(st.rot*mirror);
  ctx.transform(st.sx,0,st.shear*mirror,st.sy,0,0);
  ctx.scale(mirror,1);
  ctx.shadowColor='rgba(255,182,39,.30)';
  ctx.shadowBlur=Math.max(7,r.w*.08);
  ctx.drawImage(batterSilhouetteImage,-r.w*.49,-r.h*.965,r.w,r.h);
  ctx.restore();
}
function drawComBatter(now,layout=pitchingSceneLayout()){
  const b=S.comBatter;
  let p=0;
  if(b.willSwing&&now>=b.swingT){
    p=clamp((now-b.swingT)/(b.swingDuration||560),0,1);
  }

  const baseAlpha=layout.batterAlpha??.90;
  // スイング中は同じ生成画像の過去姿勢を薄く重ね、画像ベースの残像を作る。
  if(p>.18&&p<.72){
    drawBatterImageFrame(layout,Math.max(0,p-.13),baseAlpha*.11,now-70);
    drawBatterImageFrame(layout,Math.max(0,p-.07),baseAlpha*.18,now-35);
  }
  drawBatterImageFrame(layout,p,baseAlpha,now);

  if(p>=1&&(!S.ball||S.ball.resolved)&&now>b.swingT+(b.swingDuration||560)+120){
    b.willSwing=false;
    b.contact=false;
  }
}

/* COMピッチャー(バッティングモード用・画面下中央・背中向き) */
function drawComPitcher(now){
  const p=S.comPitcher;

  // 背番号

  ctx.fillText('18',0,-s*.24);
  // 頭+帽子(後ろ姿)
  ctx.fillStyle='#e0b08c'; ctx.beginPath(); ctx.arc(0,-s*.72,s*.14,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#16324f'; ctx.beginPath(); ctx.arc(0,-s*.73,s*.15,Math.PI,Math.PI*2); ctx.fill();

  ctx.save();
  ctx.translate(s*.16,-s*.5); ctx.rotate(armAng);
  ctx.strokeStyle='#2b4a6f'; ctx.lineWidth=s*.11;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(s*.3,0); ctx.stroke();
  ctx.strokeStyle='#e0b08c'; ctx.lineWidth=s*.09;
  ctx.beginPath(); ctx.moveTo(s*.3,0); ctx.lineTo(s*.52,0); ctx.stroke();
  // ボール(リリース前のみ手に持つ)
  if(p.phase==='windup'){
    ctx.fillStyle='#f6f3ea';
    ctx.beginPath(); ctx.arc(s*.58,0,s*.06,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
  // グラブ腕
  ctx.strokeStyle='#2b4a6f'; ctx.lineWidth=s*.11;
  ctx.beginPath(); ctx.moveTo(-s*.16,-s*.5); ctx.lineTo(-s*.34,-s*.6-wind*s*.15); ctx.stroke();
  ctx.fillStyle='#7a4a22';
  ctx.beginPath(); ctx.arc(-s*.38,-s*.62-wind*s*.15,s*.09,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function pitchBallRadius(ball,e){
  if(ball.dir!=='toCom') return 4+e*17;
  const view=ball.pitchView||S.pitchView;
  return view==='catcher'?6+Math.pow(e,1.65)*27:19-e*14;
}
function drawBall(now){
  const ball=S.ball;if(!ball)return;
  const p=clamp((now-ball.t0)/ball.dur,0,1),e=smoothstep(p);
  const curveX=Math.sin(p*Math.PI)*(ball.curveX||0);
  const view=ball.pitchView||S.pitchView;
  const arcScale=ball.dir==='toCom'?(view==='catcher'?.012:.035):0;
  const x=ball.sx+(ball.tx-ball.sx)*e+curveX;
  const y=ball.sy+(ball.ty-ball.sy)*e-Math.sin(p*Math.PI)*H*arcScale;
  const r=pitchBallRadius(ball,e);
  if(p>.015){
    ctx.fillStyle='rgba(242,239,230,.15)';
    for(let i=1;i<=3;i++){
      const pp=Math.max(0,p-i*.05),ee=smoothstep(pp);
      const trailView=ball.pitchView||S.pitchView;
      const trailArc=ball.dir==='toCom'?(trailView==='catcher'?.012:.035):0;
      const xx=ball.sx+(ball.tx-ball.sx)*ee+Math.sin(pp*Math.PI)*(ball.curveX||0);
      const yy=ball.sy+(ball.ty-ball.sy)*ee-Math.sin(pp*Math.PI)*H*trailArc;
      const rr=pitchBallRadius(ball,ee);
      ctx.beginPath();ctx.arc(xx,yy,Math.max(2,rr*.8),0,Math.PI*2);ctx.fill();
    }
  }
  drawBaseballSprite(x,y,r,1);
  if(p>=1&&!ball.resolved){if(ball.dir==='toCom')resolveUserPitch();else resolveComPitch();}
}
function drawHitBall(){
  const hb=S.hitBall; if(!hb) return;
  hb.x+=hb.vx; hb.y+=hb.vy; hb.vy+=hb.grav;
  hb.r=Math.max(2,hb.r*(hb.grav<0?0.985:1));
  ctx.fillStyle='#f6f3ea';
  ctx.beginPath(); ctx.arc(hb.x,hb.y,hb.r,0,Math.PI*2); ctx.fill();
  if(hb.y<-60||hb.x<-60||hb.x>W+60||hb.y>H+60) S.hitBall=null;
}

/* ================= メインループ ================= */
function loop(now){
  if(!S.running) return;
  requestAnimationFrame(loop);
  if(!W) resize();

  if(!S.fieldPlay && landmarker && video.readyState>=2 && video.currentTime!==lastVideoTime){
    lastVideoTime=video.currentTime;
    const res=landmarker.detectForVideo(video,now);
    lastLm = res.landmarks && res.landmarks[0] ? res.landmarks[0] : null;
  }

  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shakeAmt>0.5){
    ctx.translate((Math.random()-0.5)*shakeAmt,(Math.random()-0.5)*shakeAmt);
    shakeAmt*=0.86;
  }
  const grad=ctx.createLinearGradient(0,H*.5,0,H);
  grad.addColorStop(0,'rgba(6,13,26,0)'); grad.addColorStop(1,'rgba(6,13,26,.72)');
  ctx.fillStyle=grad; ctx.fillRect(0,H*.5,W,H*.5);

  if(S.fieldPlay){
    hint('球場カメラ：守備と走塁を再生中');
    drawFieldPlay(now);
    ctx.restore();
    return;
  }

  let catcherOverlayLayout=null;
  if(S.mode==='pitch'){
    const layout=pitchingSceneLayout();
    if(layout.view==='catcher') drawCatcherViewBase(layout);
    drawComBatter(now,layout);
    drawZoneRect(layout.zone);
    drawHomePlate(layout.zone.x+layout.zone.w/2,layout.plateY,layout.zone.w*.46);
    if(lastLm){
      const readyHint=layout.view==='catcher'
        ? '画面奥の自分から、手前のミットへ向かって振り抜け!'
        : '画面全体を使い、手を上げて相手へ振り抜け!';
      hint(S.ball?'':(now<S.cooldownUntil?'キャッチャー返球中…':readyHint));
      if(!S.ball&&!S.paused&&now>=S.cooldownUntil) trackThrow(lastLm,now);
      drawUserHeldBall(lastLm,now);
    }else{
      hint(layout.view==='catcher'
        ? '全身と投球する手が見えるように、カメラから離れて立ってください'
        : '上半身と投球する手が画面内に入る位置へ立ってください');
    }
    if(layout.view==='catcher') catcherOverlayLayout=layout;
  }else if(S.mode==='bat'){
    if(lastLm){
      updateBattingAR(lastLm,now);
      hint(S.ball?'今だ!スイング!!':'半身で構え、ARバットをゾーンへ振り抜け!');
      drawSkeleton(lastLm);
      if(!S.paused) trackSwing(lastLm,now);
    }else hint('半身の上半身と両手がカメラに映るように立ってください');
    const z=userZone();
    drawZoneRect(z, true);
    drawHomePlate(z.x+z.w/2,z.y+z.h+7,z.w*.46);
    drawComPitcher(now);
    if(lastLm) drawARBat(lastLm,now);
    // 自動投球サイクル
    if(!S.paused && !S.ball && S.comPitcher.phase==='idle' && now>=S.comPitcher.nextPitchAt && now>=S.cooldownUntil){
      comPitchStart(now);
      S.comPitcher.nextPitchAt = now+99999; // リリース後に再設定
    }
    if(!S.ball && S.comPitcher.phase==='idle' && S.comPitcher.nextPitchAt>now+9000){
      // 直前の球が解決済みなら次の投球を予約
      S.comPitcher.nextPitchAt = now+2200;
    }
  }

  drawBall(now);
  if(catcherOverlayLayout) drawCatcherForeground(now,catcherOverlayLayout);
  drawHitBall();
  ctx.restore();
}

/* ================= モード開始/画面遷移 ================= */
function resetCommon(){
  Object.assign(S,{balls:0,strikes:0,outs:0,ks:0,hitsAllowed:0,pitches:0,maxKmh:0,
    batLeft:10,batHits:0,batHRs:0,batBases:0,ball:null,hitBall:null,fieldPlay:null,
    cooldownUntil:0,paused:false});
  S.comBatter={willSwing:false,contact:false,swingT:0,swingDuration:560,bob:0};
  S.comPitcher={phase:'idle',t0:0,nextPitchAt:performance.now()+2000,releasePoint:null};
  S.swing={lastAt:-9999,quality:null};
  arm.hist={L:[],R:[]}; arm.cockedAt={L:0,R:0}; arm.activeSide=null;
  Object.assign(battingAR,{side:1,sideScore:0,ready:false,lastSeen:0,gripX:0,gripY:0,dirX:-.34,dirY:-.94,length:180,zone:null});
}
async function startMode(mode, isMatch){
  const msgEl=isMatch?$('matchSetupMsg'):(mode==='pitch'?$('pitchSetupMsg'):$('homeMsg'));
  try{
    if(!ac) ac=new (window.AudioContext||window.webkitAudioContext)();
    await initEngine(msgEl);
  }catch(err){
    console.error(err);
    msgEl.textContent='エラー: '+(err.name==='NotAllowedError'?'カメラの許可が必要です':err.message);
    return;
  }
  $('home').style.display='none';
  $('pitchSetup').style.display='none';
  $('matchSetup').style.display='none';
  $('result').style.display='none';
  resetCommon();
  S.mode=mode; S.isMatch=isMatch;
  resize(); showHUD(true); updateBoard();
  S.running=true;
  requestAnimationFrame(loop);
  if(isMatch){
    M.on=true;
    await banner('1回表 プレイボール!','あなたは<b style="color:var(--amber)">バッター</b><br>タイミングを合わせてスイング!');
    S.comPitcher.nextPitchAt=performance.now()+1200;
  }else if(mode==='bat'){
    await banner('10球勝負!','COMピッチャーの球を打ちまくれ!');
    S.comPitcher.nextPitchAt=performance.now()+1200;
  }else if(mode==='pitch'){
    const guide=S.pitchView==='catcher'
      ? '画面奥の自分の手から、手前のミットへボールが迫ります。'
      : '自分の手元から、画面奥の打者へボールが遠ざかります。';
    await banner(`${pitchViewLabel()} / ${batterHandLabel()}`,`9分割は打者の胸下から膝まで。<br>${guide}`,1550);
  }
}
function goHome(){
  S.running=false; S.fieldPlay=null; S.paused=false; M.on=false;
  showHUD(false);
  $('result').style.display='none';
  $('banner').style.display='none';
  $('pitchSetup').style.display='none';
  $('matchSetup').style.display='none';
  $('pitchSetupMsg').textContent='';
  $('matchSetupMsg').textContent='';
  $('home').style.display='flex';
  ctx && ctx.clearRect(0,0,W,H);
}

/* ===== イベント ===== */
$('btnPitch').addEventListener('click',()=>{
  $('home').style.display='none';
  $('matchSetup').style.display='none';
  $('pitchSetup').style.display='flex';
  setBatterHand(S.batterHand);
  setPitchView(S.pitchView);
});
$('pitchStartBtn').addEventListener('click',()=>startMode('pitch',false));
$('pitchSetupBackBtn').addEventListener('click',goHome);
document.querySelectorAll('.handBtn').forEach(btn=>{
  btn.addEventListener('click',()=>setBatterHand(btn.dataset.hand));
});
document.querySelectorAll('.viewBtn').forEach(btn=>{
  btn.addEventListener('click',()=>setPitchView(btn.dataset.view));
});
$('btnBat').addEventListener('click',()=>startMode('bat',false));
$('btnMatch').addEventListener('click',()=>{
  $('home').style.display='none';
  $('pitchSetup').style.display='none';
  $('matchSetup').style.display='flex';
  setBatterHand(S.batterHand);
  setPitchView(S.pitchView);
});
document.querySelectorAll('.inningsBtn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.inningsBtn').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
  });
});
$('matchStartBtn').addEventListener('click',()=>{
  M.innings = parseInt(document.querySelector('.inningsBtn.sel').dataset.inn,10);
  M.inning=1; M.half=0; M.bases=[false,false,false];
  M.scoreYou=[]; M.scoreCom=[]; M.scoreYou[0]=0;
  startMode('bat', true);
});
$('setupBackBtn').addEventListener('click',goHome);
$('homeBtn').addEventListener('click',goHome);
$('resultHomeBtn').addEventListener('click',goHome);
setBatterHand(S.batterHand);
setPitchView(S.pitchView);

$('againBtn').addEventListener('click',()=>{
  if(S.isMatch){
    M.inning=1; M.half=0; M.bases=[false,false,false];
    M.scoreYou=[0]; M.scoreCom=[];
    startMode('bat', true);
  }else{
    startMode(S.mode,false);
  }
});
</script>
